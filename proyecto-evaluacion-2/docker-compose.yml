version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cordillera_pos
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-broker
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ms1-pos:
    build: .
    container_name: ms1-pos-app
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=cordillera_pos
      - DB_USER=root
      - DB_PASSWORD=root
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_QUEUE_POS=q.pos.deviamserver
      - ORQUESTADOR_URL=http://orquestador-dummy:8080/api/v1/pos
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
