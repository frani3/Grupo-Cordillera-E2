spring.application.name=demo
server.port=${SERVER_PORT:8081}

# MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:cordillera_pos}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
app.rabbitmq.queue.pos=${RABBITMQ_QUEUE_POS:q.pos.deviamserver}

# Orquestador (Circuit Breaker apunta aqui)
app.orquestador.url=${ORQUESTADOR_URL:http://orq-service:8080/api/v1/pos}

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.orquestadorCB.sliding-window-size=5
resilience4j.circuitbreaker.instances.orquestadorCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.orquestadorCB.wait-duration-in-open-state=10s
